<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2340;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a5276;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e67e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0d9b5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Decorative Ring -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="200" cy="200" r="165" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  
  <!-- Accent Arc (top) -->
  <path d="M 80 120 A 150 150 0 0 1 320 120" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Main "S" Letter -->
  <text x="200" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="180" font-weight="bold" fill="url(#sGrad)" letter-spacing="-5">S</text>
  
  <!-- "SAHU" text -->
  <text x="200" y="290" text-anchor="middle" font-family="'Poppins', Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff" letter-spacing="12">SAHU</text>
  
  <!-- "ENTERPRISES" text -->
  <text x="200" y="320" text-anchor="middle" font-family="'Poppins', Arial, sans-serif" font-size="16" font-weight="500" fill="url(#accentGrad)" letter-spacing="8">ENTERPRISES</text>
  
  <!-- Small tagline -->
  <text x="200" y="348" text-anchor="middle" font-family="'Poppins', Arial, sans-serif" font-size="9" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="3">EST. 2012 • JAUNPUR</text>
  
  <!-- Accent accent dot decorations -->
  <circle cx="115" cy="340" r="3" fill="#e67e22" opacity="0.6"/>
  <circle cx="285" cy="340" r="3" fill="#f39c12" opacity="0.6"/>
  
  <!-- Bottom accent line -->
  <line x1="140" y1="332" x2="260" y2="332" stroke="url(#accentGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
